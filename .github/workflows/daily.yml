name: Daily data refresh

on:
  schedule:
    # Runs at 06:00 UTC every day (before European morning fixtures)
    - cron: '0 6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  trigger-netlify-build:
    name: Trigger Netlify deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build hook
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "ERROR: NETLIFY_BUILD_HOOK secret is not set" >&2
            exit 1
          fi
          echo "Triggering daily Netlify build at $(date -u)"
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X POST "$NETLIFY_BUILD_HOOK")
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $(cat response.json)"
          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "ERROR: Netlify build hook returned $HTTP_CODE" >&2
            exit 1
          fi
          echo "Daily refresh triggered successfully"
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
